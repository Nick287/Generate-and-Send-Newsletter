# =============================================================================
# AI Weekly Digest — example config
# Copy to config.yaml and fill in your values. config.yaml is gitignored.
# =============================================================================

issue_number: 1

# ---- LLM (any OpenAI-compatible Chat Completions endpoint) -------------------
llm:
  endpoint: "https://api.openai.com/v1/chat/completions"
  api_key: "YOUR_OPENAI_API_KEY"   # or set env LLM_API_KEY / OPENAI_API_KEY
  model: "gpt-4o"                  # e.g. gpt-4o, claude-opus-4, your local model
  temperature: 0.2
  max_tokens: 8000
  timeout: 180

# ---- Email -------------------------------------------------------------------
email:
  provider: "acs"                  # one of: acs | sendgrid | smtp

  recipients:
    - "you@example.com"

  # --- ACS (Azure Communication Services) ---
  acs_sender: "DoNotReply@your-domain.azurecomm.net"
  acs_connection_string: "YOUR_ACS_CONNECTION_STRING"   # or env ACS_CONNECTION_STRING

  # --- SendGrid (alternative) ---
  # sendgrid_api_key: "YOUR_SENDGRID_KEY"               # or env SENDGRID_API_KEY

  # --- SMTP (alternative; Office365, Gmail, etc.) ---
  # smtp_host: "smtp.office365.com"
  # smtp_port: 587
  # smtp_user: "you@example.com"
  # smtp_pass: "YOUR_SMTP_PASSWORD"
  # smtp_use_ssl: false

# ---- Fetch stage -------------------------------------------------------------
fetch:
  window_days: 7
  max_workers: 10
  max_per_feed: 25
  arxiv_cap_per_category: 10
  fail_threshold: 0.5              # abort if >50% of feeds fail

# ---- Enrich stage ------------------------------------------------------------
enrich:
  top_candidates: 40
  fetch_delay: 0.5
  fetch_timeout: 15
  max_body_chars: 3000

# ---- Cleanup -----------------------------------------------------------------
cleanup:
  retention_days: 30
