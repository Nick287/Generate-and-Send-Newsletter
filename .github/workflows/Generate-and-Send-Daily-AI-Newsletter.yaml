name: Generate and Send Daily AI Newsletter

on:
  schedule:
    # Run daily at UTC 08:00 | 每天 UTC 08:00 运行
    - cron: '0 8 * * *'

  # Allow manual trigger from the Actions tab | 允许从 Actions 页面手动触发
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip real email send (default: false; set true for safe dry-run)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Least-privilege token | 最小权限 token
permissions:
  contents: read

# Avoid overlapping schedule + manual runs | 避免计划与手动并发
concurrency:
  group: send-newsletter
  cancel-in-progress: false

jobs:
  build_and_send_job:
    runs-on: ubuntu-latest
    name: Build and Send Daily Newsletter
    # RECOMMENDED (must be enabled by repo owner in Settings → Environments):
    # bind real sends to a protected GitHub Environment so secrets only resolve
    # there and reviewers can gate production runs. To opt in, create an
    # environment named `production-send` and uncomment the line below.
    # 推荐（需 repo owner 在 Settings → Environments 中启用）：
    # 创建 `production-send` environment 后取消下面一行注释。
    # environment: production-send
    timeout-minutes: 30

    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 2. Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Generate config.yaml
        # Build a minimal config.yaml from env vars (no NEWSLETTER_CONFIG secret needed)
        # 从环境变量生成最小 config.yaml（不需要 NEWSLETTER_CONFIG secret）
        run: |
          mkdir -p config
          cat > config/config.yaml << 'EOF'
          issue_number: 1
          llm:
            endpoint: ""
            api_key: ""
            model: "gpt-5.4"
            temperature: 0.2
            max_tokens: 8000
            timeout: 180
          email:
            provider: "smtp"
            recipients: []
          fetch:
            window_days: 7
            max_workers: 10
            max_per_feed: 25
            arxiv_cap_per_category: 10
            fail_threshold: 0.5
          enrich:
            top_candidates: 40
            fetch_delay: 0.5
            fetch_timeout: 15
            max_body_chars: 3000
          cleanup:
            retention_days: 30
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' config/config.yaml

      - name: 5. Generate and send newsletter
        # Run the Agent Framework pipeline in CLI mode
        # 以 CLI 模式运行 Agent Framework 流水线
        env:
          AZURE_OPENAI_TOKEN: ${{ secrets.AZURE_OPENAI_TOKEN }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SENDER_USERNAME: ${{ vars.SENDER_USERNAME }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          TO_ADDRS: ${{ vars.TO_ADDRS }}
          FROM_ALIAS: ${{ vars.FROM_ALIAS }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Manual dry-run requested — skipping real send."
            python agent_run.py --cli --dry-run
          else
            python agent_run.py --cli
          fi

      - name: 6. Upload artifacts
        # Save intermediate & output files for debugging
        # 保存中间产物和输出文件用于调试
        # NOTE: artifacts on a public repo are publicly downloadable. Do NOT
        # include secrets, real recipient lists, or sensitive config in artifacts.
        # 注意：公共仓库的 artifacts 任何人都可下载，不要包含 secret、真实收件人或敏感配置。
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            dist/
          retention-days: 14
