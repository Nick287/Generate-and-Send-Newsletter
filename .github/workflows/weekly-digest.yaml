name: Weekly AI Digest

on:
  schedule:
    - cron: '0 1 * * 1,5'  # Monday/Friday 09:00 HKT (01:00 UTC)
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Actually send the newsletter email'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate config
        env:
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FALLBACK_ENDPOINT: ${{ secrets.LLM_FALLBACK_ENDPOINT }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          LLM_FALLBACK_MODEL: ${{ secrets.LLM_FALLBACK_MODEL }}
          ACS_SENDER: ${{ secrets.ACS_SENDER }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          ISSUE_NUMBER: ${{ github.run_number }}
        run: |
          python3 << 'EOF'
          import yaml, os
          recipients = os.environ.get('RECIPIENTS', '')
          recipient_list = [r.strip() for r in recipients.split(',') if r.strip()]
          config = {
              'issue_number': int(os.environ.get('ISSUE_NUMBER', '1')),
              'recipients': recipient_list,
              'acs_sender': os.environ.get('ACS_SENDER', ''),
              'llm': {
                  'primary': {
                      'endpoint': os.environ.get('LLM_ENDPOINT', ''),
                      'model': os.environ.get('LLM_MODEL', 'grok-4-20-reasoning'),
                      'subscription_key': os.environ.get('LLM_API_KEY', ''),
                      'temperature': 0.2, 'max_tokens': 8000, 'timeout': 180,
                  },
                  'fallback': {
                      'endpoint': os.environ.get('LLM_FALLBACK_ENDPOINT', ''),
                      'model': os.environ.get('LLM_FALLBACK_MODEL', 'gpt-5.4'),
                      'subscription_key': os.environ.get('LLM_FALLBACK_API_KEY', ''),
                      'temperature': 0.3, 'max_tokens': 8000, 'timeout': 180,
                  },
              },
              'newsletter': {'title': 'AI Weekly Digest', 'subtitle': 'Curated by Microsoft Digital CSA Team'},
              'fetch': {'max_workers': 10, 'timeout': 15, 'window_days': 7},
              'enrich': {'top_candidates': 50, 'fetch_timeout': 15, 'delay_between': 0.5, 'max_body_chars': 3000},
          }
          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          print('config.yaml generated')
          EOF

      - name: Run newsletter
        env:
          ACS_CONNECTION_STRING: ${{ secrets.ACS_CONNECTION_STRING }}
          ISSUE_NUMBER: ${{ github.run_number }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.send_email }}" = "true" ]; then
            python3 generate.py || [ $? -eq 1 ]
          else
            python3 generate.py --dry-run || [ $? -eq 1 ]
          fi

      - name: Upload newsletter HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_number }}
          path: output/newsletter-*.html
          retention-days: 30
