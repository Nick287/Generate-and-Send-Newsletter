# .github/workflows/send-daily-newsletter.yml

name: Generate and Send Daily AI Newsletter

on:
  schedule:
    # 每天的 UTC 时间上午 8 点运行
    # Cron 语法: 分 时 日 月 周
    # - cron: '0 8 * * *'
  
  # 允许您手动在 Actions 页面点击按钮来测试运行
  workflow_dispatch:

jobs:
  build_and_send_job:
    runs-on: ubuntu-latest
    name: Build and Send Daily Newsletter

    steps:
      - name: 1. Checkout repository code
        # 检出你的代码，这样 Runner 才能访问到 Python 脚本
        uses: actions/checkout@v4

      - name: 2. Set up Python environment
        # 设置 Python 3.11 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install Python dependencies
        # 安装脚本运行所必需的库
        run: |
          python -m pip install --upgrade pip
          pip install requests openai

      - name: 4. Generate newsletter content
        # 运行你的 Python 脚本来生成 HTML 文件和主题文件
        # AZURE_OPENAI_KEY 这个环境变量会从 GitHub Secrets 中读取
        env:
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        run: python test/AINews.py

      - name: 5. Read newsletter subject from file
        # 从 Python 脚本生成的 subject.txt 文件中读取邮件主题
        id: get_subject
        run: echo "subject=$(cat test/subject.txt)" >> $GITHUB_OUTPUT

      - name: 6. Find the generated HTML file
        # 查找由 Python 脚本生成的 HTML 文件的路径
        id: get_html_path
        run: echo "path=$(find test -name '新闻简报_*.html')" >> $GITHUB_OUTPUT

      - name: 7. Send the email with newsletter
        # 使用你选择的 action 来发送邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mail.comlan.com
          server_port: 25
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          
          # 从上一步 (get_subject) 的输出中获取邮件主题
          subject: ${{ steps.get_subject.outputs.subject }}
          
          # 收件人列表
          to: bo.wang@comlan.com,mi.qs@comlan.com,wang.tianyang@comlan.com
          from: ai.public@comlan.com 

          # 使用 html_body 参数来发送 HTML 格式的邮件
          # file:// 协议会告诉 action 从指定路径读取文件内容
          html_body: file://${{ steps.get_html_path.outputs.path }}
