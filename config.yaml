# =============================================================================
# AI Weekly Digest — runtime config
# Email & LLM settings are loaded from .env (env vars take priority over YAML)
# RSS feeds are loaded from feeds.yaml
# =============================================================================

issue_number: 1

# ---- LLM (overridden by AZURE_OPENAI_ENDPOINT / AZURE_OPENAI_TOKEN env vars)
llm:
  # endpoint & api_key come from .env — leave empty or set fallback here
  endpoint: ""
  api_key: ""
  model: "gpt-5.4"
  temperature: 0.2
  max_tokens: 8000
  timeout: 180

# ---- Email (overridden by SMTP_HOST / SENDER_USERNAME / TO_ADDRS env vars) ---
email:
  provider: "smtp"   # auto-detected when SMTP env vars are set
  recipients: []     # overridden by TO_ADDRS env var

# ---- Fetch stage -------------------------------------------------------------
fetch:
  window_days: 7
  max_workers: 10
  max_per_feed: 25
  arxiv_cap_per_category: 10
  fail_threshold: 0.5

# ---- Enrich stage ------------------------------------------------------------
enrich:
  top_candidates: 40
  fetch_delay: 0.5
  fetch_timeout: 15
  max_body_chars: 3000

# ---- Cleanup -----------------------------------------------------------------
cleanup:
  retention_days: 30

# ---- RSS Feed Sources --------------------------------------------------------
# Grouped by category. Each entry needs: name, url
# Optional per-feed: max_items (int), skip_enrich (bool)
feeds:
  azure_microsoft:
